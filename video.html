<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocMaster &mdash; Video</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="video">

    <nav id="main-nav"></nav>

    <!-- Page Header -->
    <section class="subpage-hero">
        <div class="container">
            <div class="section-label">Demo Video</div>
            <h1 class="subpage-title">See DocMaster in Action</h1>
            <p class="subpage-desc">
                Watch a full walkthrough of the system: from uploading documents, building semantic indexes,
                filtering with natural-language conditions, to interactive RAG Q&amp;A.
            </p>
        </div>
    </section>

    <!-- Video -->
    <section class="section">
      <div class="container">
        <div class="video-wrapper">
          <div style="position: relative; padding-top: 56.25%; height: 0; overflow: hidden; border-radius: 12px;">
            <iframe
              src="https://www.youtube.com/embed/uxMhXe6jegI"
              title="DocMaster demo video"
              frameborder="0"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              allowfullscreen
              style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;">
            </iframe>
          </div>
    
          <!-- Fallback link if the embed is not visible -->
          <p style="margin-top: 12px; text-align: center;">
            Can’t see the video?
            <a href="https://drive.google.com/file/d/1F1CD0X0hxXGDUalt_OyGsgfe3rjScffD/view?usp=sharing" target="_blank" rel="noopener noreferrer">
              Open it on Google Drive
            </a>
          </p>
        </div>
      </div>
    </section>

    <footer id="main-footer"></footer>

    <script src="template.js"></script>
</body>
</html>
